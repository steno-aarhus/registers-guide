<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 472" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ax" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- index-dato: bånd + stiplet linje -->
  <rect x="462" y="52" width="16" height="246" fill="#345783" opacity="0.08"/>
  <line x1="470" y1="52" x2="470" y2="298" stroke="#345783" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="470" y="44" text-anchor="middle" font-size="13" fill="#345783">Index-dato</text>

  <!-- tidsakse -->
  <line x1="205" y1="330" x2="690" y2="330" stroke="#555" stroke-width="1.5" marker-end="url(#ax)"/>
  <text x="690" y="348" text-anchor="end" font-size="12" fill="#555" font-style="italic">tid</text>

  <!-- Row 1: eksponeret (case) -->
  <text x="12" y="74" font-size="11.5" fill="#1a1a1a">Eksponeret (case)</text>
  <line x1="210" y1="70" x2="655" y2="70" stroke="#555" stroke-width="2.5"/>
  <circle cx="470" cy="70" r="7" fill="#5aa84f" stroke="#3d7a35" stroke-width="2"/>

  <!-- Row 2: samplet sammenligningsperson -->
  <text x="12" y="116" font-size="11.5" fill="#1a1a1a">Sammenligningsperson</text>
  <line x1="210" y1="112" x2="655" y2="112" stroke="#555" stroke-width="2.5"/>
  <circle cx="470" cy="112" r="7" fill="#ffffff" stroke="#4a78b5" stroke-width="3"/>

  <!-- Row 3: samplet sammenligningsperson -->
  <text x="12" y="158" font-size="11.5" fill="#1a1a1a">Sammenligningsperson</text>
  <line x1="210" y1="154" x2="655" y2="154" stroke="#555" stroke-width="2.5"/>
  <circle cx="470" cy="154" r="7" fill="#ffffff" stroke="#4a78b5" stroke-width="3"/>

  <!-- Row 4: i risiko, ikke valgt -->
  <text x="12" y="200" font-size="11.5" fill="#1a1a1a">I risiko (ikke valgt)</text>
  <line x1="210" y1="196" x2="655" y2="196" stroke="#555" stroke-width="2.5"/>
  <circle cx="470" cy="196" r="4" fill="#ffffff" stroke="#aaa" stroke-width="1.5"/>

  <!-- Row 5: senere eksponeret (crossover) -->
  <text x="12" y="242" font-size="11.5" fill="#1a1a1a">Senere eksponeret</text>
  <line x1="210" y1="238" x2="560" y2="238" stroke="#555" stroke-width="2.5"/>
  <line x1="560" y1="238" x2="655" y2="238" stroke="#999" stroke-width="2" stroke-dasharray="5,4"/>
  <circle cx="470" cy="238" r="7" fill="#ffffff" stroke="#4a78b5" stroke-width="3"/>
  <circle cx="560" cy="238" r="7" fill="#5aa84f" stroke="#3d7a35" stroke-width="2"/>
  <text x="560" y="224" text-anchor="middle" font-size="10.5" fill="#888" font-style="italic">crossover</text>

  <!-- Row 6: død/udvandret før index -->
  <text x="12" y="284" font-size="11.5" fill="#1a1a1a">Død/udvandret før index</text>
  <line x1="210" y1="280" x2="400" y2="280" stroke="#555" stroke-width="2.5"/>
  <line x1="394" y1="274" x2="406" y2="286" stroke="#c0392b" stroke-width="2.5"/>
  <line x1="394" y1="286" x2="406" y2="274" stroke="#c0392b" stroke-width="2.5"/>

  <!-- legende -->
  <g font-size="11.5" fill="#1a1a1a">
    <circle cx="216" cy="366" r="7" fill="#5aa84f" stroke="#3d7a35" stroke-width="2"/>
    <text x="232" y="370">eksponering (casens index-dato)</text>

    <circle cx="216" cy="390" r="7" fill="#ffffff" stroke="#4a78b5" stroke-width="3"/>
    <text x="232" y="394">samplet sammenligningsperson (får casens index-dato)</text>

    <circle cx="216" cy="414" r="4" fill="#ffffff" stroke="#aaa" stroke-width="1.5"/>
    <text x="232" y="418">i risiko, men ikke valgt</text>

    <line x1="210" y1="438" x2="222" y2="450" stroke="#c0392b" stroke-width="2.5"/>
    <line x1="210" y1="450" x2="222" y2="438" stroke="#c0392b" stroke-width="2.5"/>
    <text x="232" y="448">død/udvandret før index → ikke i risiko</text>

    <line x1="208" y1="466" x2="224" y2="466" stroke="#999" stroke-width="2" stroke-dasharray="5,4"/>
    <text x="232" y="470">censureret (ude af risiko, fx efter crossover)</text>
  </g>
</svg>
