<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- edges -->
  <g stroke="#555" stroke-width="2" marker-end="url(#arrow)" fill="none">
    <line x1="306" y1="80"  x2="152" y2="178"/>  <!-- Age -> Surgery -->
    <line x1="374" y1="79"  x2="528" y2="177"/>  <!-- Age -> Dementia -->
    <line x1="168" y1="205" x2="288" y2="205"/>  <!-- Surgery -> Delirium -->
    <line x1="392" y1="205" x2="512" y2="205"/>  <!-- Delirium -> Dementia -->
    <line x1="154" y1="233" x2="306" y2="329"/>  <!-- Surgery -> Hospitalisation -->
    <line x1="528" y1="233" x2="374" y2="329"/>  <!-- Dementia -> Hospitalisation -->
  </g>

  <!-- nodes -->
  <!-- Age (confounder) -->
  <ellipse cx="340" cy="58" rx="52" ry="24" fill="#ffffff" stroke="#555" stroke-width="2"/>
  <text x="340" y="63" text-anchor="middle" font-size="16" fill="#1a1a1a">Age</text>
  <text x="340" y="24" text-anchor="middle" font-size="11" fill="#888" font-style="italic">confounder — adjust</text>

  <!-- Surgery (exposure) -->
  <ellipse cx="110" cy="205" rx="58" ry="24" fill="#5aa84f" stroke="#3d7a35" stroke-width="2"/>
  <text x="110" y="210" text-anchor="middle" font-size="16" fill="#ffffff">Surgery</text>
  <text x="110" y="244" text-anchor="middle" font-size="11" fill="#888" font-style="italic">exposure</text>

  <!-- Delirium (mediator) -->
  <ellipse cx="340" cy="205" rx="56" ry="24" fill="#ffffff" stroke="#555" stroke-width="2"/>
  <text x="340" y="210" text-anchor="middle" font-size="16" fill="#1a1a1a">Delirium</text>
  <text x="340" y="244" text-anchor="middle" font-size="11" fill="#888" font-style="italic">mediator — don't adjust</text>

  <!-- Dementia (outcome) -->
  <ellipse cx="572" cy="205" rx="62" ry="24" fill="#4a78b5" stroke="#345783" stroke-width="2"/>
  <text x="572" y="210" text-anchor="middle" font-size="16" fill="#ffffff">Dementia</text>
  <text x="572" y="244" text-anchor="middle" font-size="11" fill="#888" font-style="italic">outcome</text>

  <!-- Hospitalisation (collider) -->
  <ellipse cx="340" cy="350" rx="86" ry="24" fill="#ffffff" stroke="#555" stroke-width="2"/>
  <text x="340" y="355" text-anchor="middle" font-size="16" fill="#1a1a1a">Hospitalisation</text>
  <text x="340" y="389" text-anchor="middle" font-size="11" fill="#888" font-style="italic">collider — don't adjust</text>
</svg>
