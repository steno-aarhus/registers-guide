name: Quarto Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege for the official Pages deploy: read the repo, write to Pages,
# and mint the short-lived OIDC token that actions/deploy-pages uses.
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid overlapping deploys; let an in-progress deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.8.27"   # pin Quarto for reproducible builds; bump deliberately

      - name: Render Quarto site
        run: quarto render

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site   # Quarto output dir (output-dir: _site at repo root)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
