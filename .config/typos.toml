[files]
extend-exclude = [
  "*.html",
  "*.css",
  ".quarto/*",
  "_site/*",
  "*.svg",
  "da/**"        # dansk sektion: typos er engelsk-orienteret og flager næsten hvert ord - tjek kun en/
]

[default.extend-words]
# Danske ord/fagtermer og kode-tokens der optræder i en/ (variabelnavne, anker-id'er,
# filnavne, DST-formattabeller, ATC-koder, citerede eksempelværdier) - ikke stavefejl.
alle = "alle"
objekt = "objekt"
registre = "registre"
tekst = "tekst"
formater = "formater"
Fase = "Fase"
fase = "fase"
Fane = "Fane"
titel = "titel"
tabel = "tabel"
som = "som"
separat = "separat"
selv = "selv"
holdes = "holdes"
foldes = "foldes"
negativ = "negativ"
sav = "sav"        # .sav (SPSS-filendelse) og read_sav()
BA = "BA"          # ATC-kode-fragment, fx A10BA02 (metformin)
PN = "PN"          # fra "PNRs"
