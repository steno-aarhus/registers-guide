format:
  html:
    # Besøgsstatistik via GoatCounter
    # Dashboard: https://dsthelp.goatcounter.com
    include-in-header:
      - text: |
          <script data-goatcounter="https://dsthelp.goatcounter.com/count"
                  async src="//gc.zgo.at/count.js"></script>
    # Feedback-widget → Cloudflare Worker + D1.
    # Markup/JS i _feedback.html, styling i custom.scss.
    include-after-body:
      - file: _feedback.html
      - file: _open-details.html
    theme:
      - flatly
      - custom.scss
    smooth-scroll: true
    toc: true
    toc-depth: 3
    toc-title: "På denne side"
    highlight-style: github
    code-fold: false
    lightbox: true
    mermaid:
      theme: neutral
