format:
  html:
    # Besøgsstatistik via GoatCounter (cookie-fri, GDPR-venlig).
    # Dashboard: https://dsthelp.goatcounter.com
    include-in-header:
      - text: |
          <script data-goatcounter="https://dsthelp.goatcounter.com/count"
                  async src="//gc.zgo.at/count.js"></script>
    theme:
      - flatly
      - custom.scss
    smooth-scroll: true
    toc: true
    toc-depth: 3
    toc-title: "På denne side"
    highlight-style: github
    code-fold: false
    lightbox: true
    mermaid:
      theme: neutral
